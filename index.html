                                            </div>
                                            <div class="flex items-center gap-1 px-3 py-1.5 bg-kya-blue/10 text-kya-blue rounded-full text-[10px] font-black uppercase">
                                                <Icon name="trending-up" className="w-3 h-3" />
                                                +7% vs M-1
                                            </div>
                                        </div>
                                        <div class="h-80">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <LineChart data={stats.historyData}>
                                                    <defs>
                                                        <linearGradient id="colorAvg" x1="0" y1="0" x2="0" y2="1">
                                                            <stop offset="5%" stopColor="#F58220" stopOpacity={0.8} />
                                                            <stop offset="95%" stopColor="#F58220" stopOpacity={0} />
                                                        </linearGradient>
                                                    </defs>
                                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f0f0f0" />
                                                    <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{ fontSize: 12, fontWeight: 700, fill: '#cbd5e1' }} dy={10} />
                                                    <YAxis axisLine={false} tickLine={false} tick={{ fontSize: 10, fontWeight: 700, fill: '#cbd5e1' }} domain={[0, 100]} />
                                                    <Tooltip
                                                        contentStyle={{ borderRadius: '20px', border: 'none', boxShadow: '0 20px 25px -5px rgb(0 0 0 / 0.1)', padding: '15px' }}
                                                        itemStyle={{ fontSize: '14px', fontWeight: '900', color: '#0054A6' }}
                                                    />
                                                    <Line
                                                        type="monotone"
                                                        dataKey="avg"
                                                        stroke="url(#colorAvg)"
                                                        strokeWidth={6}
                                                        dot={{ r: 8, fill: '#fff', strokeWidth: 4, stroke: '#F58220' }}
                                                        activeDot={{ r: 10, fill: '#F58220', stroke: '#fff', strokeWidth: 4 }}
                                                    />
                                                </LineChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>

                                    {/* Stats Comparison List */}
                                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-50 flex flex-col">
                                        <h3 class="font-black text-gray-900 text-xl tracking-tight mb-8">Performance Hebdo</h3>
                                        <div class="flex-1 space-y-8">
                                            {stats.deptStats.map(dept => (
                                                <div key={dept.id} class="flex items-center gap-4 group">
                                                    <div class={`w-1 shadow-sm h-12 rounded-full ${dept.id === 'rh' ? 'bg-kya-orange' : 'bg-kya-blue'}`}></div>
                                                    <div class="flex-1">
                                                        <div class="flex justify-between items-baseline">
                                                            <p class="text-xs font-black text-gray-900 uppercase tracking-wider">{dept.name}</p>
                                                            <span class={`text-xs font-black ${dept.diff >= 0 ? 'text-green-500' : 'text-red-500'}`}>
                                                                {dept.diff >= 0 ? '▲' : '▼'} {Math.abs(dept.diff)}%
                                                            </span>
                                                        </div>
                                                        <div class="flex items-center gap-2 mt-1">
                                                            <div class="flex-1 bg-gray-50 h-1.5 rounded-full overflow-hidden">
                                                                <div class="bg-gray-200 h-full w-full absolute bg-opacity-20"></div>
                                                                <div
                                                                    class={`h-full rounded-full transition-all duration-1000 ${dept.id === 'rh' ? 'bg-kya-orange' : 'bg-kya-blue'}`}
                                                                    style={{ width: `${dept.progress}%` }}
                                                                ></div>
                                                            </div>
                                                            <span class="text-[10px] font-black text-gray-400 w-8">{dept.progress}%</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        <div class="mt-8 pt-8 border-t border-gray-50">
                                            <div class="p-4 bg-kya-blue rounded-2xl text-white shadow-lg shadow-kya-blue/20">
                                                <div class="flex justify-between items-center">
                                                    <div>
                                                        <p class="text-[10px] font-bold uppercase opacity-60">Moyenne DSS</p>
                                                        <p class="text-2xl font-black">{stats.totalAvg}%</p>
                                                    </div>
                                                    <Icon name="award" className="w-10 h-10 opacity-20" />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : view === 'stats' ? (
                            <div class="animate-fade-in space-y-10">
                                {/* Stats Cards Grid */}
                                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                                    {/* Total Tasks */}
                                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-50 hover:shadow-xl transition-all group overflow-hidden relative">
                                        <div class="flex justify-between items-start mb-6">
                                            <div class="p-4 bg-gray-900 text-white rounded-2xl shadow-lg ring-4 ring-gray-50">
                                                <Icon name="list" className="w-8 h-8" />
                                            </div>
                                            <div class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Total Global</div>
                                        </div>
                                        <div class="space-y-1">
                                            <h3 class="text-4xl font-black text-gray-900">{stats.summary.total}</h3>
                                            <p class="text-xs font-bold text-gray-500 uppercase tracking-tight">Tâches digitalisables</p>
                                        </div>
                                        <div class="absolute -right-4 -bottom-4 opacity-5 transform rotate-12 group-hover:scale-110 transition-transform">
                                            <Icon name="list" className="w-32 h-32" />
                                        </div>
                                    </div>

                                    {/* Digitized */}
                                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-50 hover:shadow-xl transition-all group overflow-hidden relative border-l-8 border-l-kya-green">
                                        <div class="flex justify-between items-start mb-6">
                                            <div class="p-4 bg-kya-green text-white rounded-2xl shadow-lg ring-4 ring-green-50">
                                                <Icon name="check-circle" className="w-8 h-8" />
                                            </div>
                                            <div class="px-3 py-1 bg-green-100 text-green-600 rounded-full text-[10px] font-black uppercase tracking-widest">
                                                {Math.round((stats.summary.digitized / stats.summary.total) * 100) || 0}%
                                            </div>
                                        </div>
                                        <div class="space-y-1">
                                            <h3 class="text-4xl font-black text-gray-900">{stats.summary.digitized}</h3>
                                            <p class="text-xs font-bold text-gray-500 uppercase tracking-tight">Déjà Digitalisées</p>
                                        </div>
                                        <div class="absolute -right-4 -bottom-4 opacity-5 transform -rotate-12 group-hover:scale-110 transition-transform">
                                            <Icon name="check-circle" className="w-32 h-32 text-kya-green" />
                                        </div>
                                    </div>

                                    {/* In Progress */}
                                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-50 hover:shadow-xl transition-all group overflow-hidden relative border-l-8 border-l-kya-orange">
                                        <div class="flex justify-between items-start mb-6">
                                            <div class="p-4 bg-kya-orange text-white rounded-2xl shadow-lg ring-4 ring-orange-50">
                                                <Icon name="activity" className="w-8 h-8" />
                                            </div>
                                            <div class="px-3 py-1 bg-orange-100 text-kya-orange rounded-full text-[10px] font-black uppercase tracking-widest">
                                                {Math.round((stats.summary.inProgress / stats.summary.total) * 100) || 0}%
                                            </div>
                                        </div>
                                        <div class="space-y-1">
                                            <h3 class="text-4xl font-black text-gray-900">{stats.summary.inProgress}</h3>
                                            <p class="text-xs font-bold text-gray-500 uppercase tracking-tight">En cours</p>
                                        </div>
                                        <div class="absolute -right-4 -bottom-4 opacity-5 transform rotate-6 group-hover:scale-110 transition-transform">
                                            <Icon name="activity" className="w-32 h-32 text-kya-orange" />
                                        </div>
                                    </div>

                                    {/* Already Used (Deployed) */}
                                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-50 hover:shadow-xl transition-all group overflow-hidden relative border-l-8 border-l-kya-blue">
                                        <div class="flex justify-between items-start mb-6">
                                            <div class="p-4 bg-kya-blue text-white rounded-2xl shadow-lg ring-4 ring-blue-50">
                                                <Icon name="rocket" className="w-8 h-8" />
                                            </div>
                                            <div class="px-3 py-1 bg-blue-100 text-kya-blue rounded-full text-[10px] font-black uppercase tracking-widest">
                                                {Math.round((stats.summary.deployed / stats.summary.total) * 100) || 0}%
                                            </div>
                                        </div>
                                        <div class="space-y-1">
                                            <h3 class="text-4xl font-black text-gray-900">{stats.summary.deployed}</h3>
                                            <p class="text-xs font-bold text-gray-500 uppercase tracking-tight">Déjà Utilisées</p>
                                        </div>
                                        <div class="absolute -right-4 -bottom-4 opacity-5 transform -rotate-12 group-hover:scale-110 transition-transform">
                                            <Icon name="rocket" className="w-32 h-32 text-kya-blue" />
                                        </div>
                                    </div>
                                </div>

                                {/* Interactive Charts Module */}
                                {stats.summary.total > 0 && (
                                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                        {/* Chart 1: Repartition Globale */}
                                        <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-50 flex flex-col relative group">
                                            <div class="flex justify-between items-center mb-6">
                                                <div>
                                                    <h3 class="font-black text-gray-900 text-xl tracking-tight">Répartition Globale</h3>
                                                    <p class="text-xs text-gray-400 font-bold uppercase tracking-widest mt-1">État de toutes les tâches</p>
                                                </div>
                                                <button onClick={() => downloadChart('chart-status', 'repartition_globale')} class="p-2 bg-gray-50 text-gray-400 hover:text-kya-blue hover:bg-blue-50 rounded-xl transition-all shadow-sm" title="Télécharger en image">
                                                    <Icon name="download" className="w-5 h-5" />
                                                </button>
                                            </div>
                                            <div id="chart-status" class="flex-1 flex items-center justify-center min-h-[300px]">
                                                <ResponsiveContainer width="100%" height={300}>
                                                    <PieChart margin={{ top: 30, right: 40, left: 40, bottom: 20 }}>
                                                        <Pie
                                                            data={stats.statusData}
                                                            cx="50%"
                                                            cy="50%"
                                                            innerRadius={60}
                                                            outerRadius={85}
                                                            paddingAngle={5}
                                                            dataKey="value"
                                                            stroke="none"
                                                            labelLine={true}
                                                            label={({ name, value, percent }) => percent > 0 ? `${name}: ${value}` : ''}
                                                        >
                                                            {stats.statusData.map((entry, index) => (
                                                                <Cell key={`cell-${index}`} fill={entry.color} />
                                                            ))}
                                                        </Pie>
                                                        <Tooltip contentStyle={{ borderRadius: '1rem', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1)' }} />
                                                    </PieChart>
                                                </ResponsiveContainer>
                                            </div>
                                        </div>

                                        {/* Chart 2: Taux de deploiement */}
                                        <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-50 flex flex-col relative group">
                                            <div class="flex justify-between items-center mb-6">
                                                <div>
                                                    <h3 class="font-black text-gray-900 text-xl tracking-tight">Taux de Déploiement</h3>
                                                    <p class="text-xs text-gray-400 font-bold uppercase tracking-widest mt-1">Sur les tâches terminées</p>
                                                </div>
                                                <button onClick={() => downloadChart('chart-deploy', 'taux_deploiement')} class="p-2 bg-gray-50 text-gray-400 hover:text-kya-blue hover:bg-blue-50 rounded-xl transition-all shadow-sm" title="Télécharger en image">
                                                    <Icon name="download" className="w-5 h-5" />
                                                </button>
                                            </div>
                                            <div id="chart-deploy" class="flex-1 flex items-center justify-center min-h-[300px]">
                                                {stats.summary.digitized > 0 ? (
                                                    <ResponsiveContainer width="100%" height={300}>
                                                        <PieChart margin={{ top: 30, right: 40, left: 40, bottom: 20 }}>
                                                            <Pie
                                                                data={stats.deployData}
                                                                cx="50%"
                                                                cy="50%"
                                                                innerRadius={60}
                                                                outerRadius={85}
                                                                paddingAngle={5}
                                                                dataKey="value"
                                                                stroke="none"
                                                                labelLine={true}
                                                                label={({ name, value, percent }) => percent > 0 ? `${name}: ${value}` : ''}
                                                            >
                                                                {stats.deployData.map((entry, index) => (
                                                                    <Cell key={`cell-${index}`} fill={entry.color} />
                                                                ))}
                                                            </Pie>
                                                            <Tooltip contentStyle={{ borderRadius: '1rem', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1)' }} />
                                                        </PieChart>
                                                    </ResponsiveContainer>
                                                ) : (
                                                    <div class="flex flex-col items-center justify-center h-full text-gray-400">
                                                        <Icon name="rocket" className="w-12 h-12 mb-2 opacity-20" />
                                                        <p class="text-xs font-bold uppercase tracking-widest">Aucune tâche terminée</p>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* Departmental Charts */}
                                {stats.summary.total > 0 && (
                                    <div class="space-y-6">
                                        <div>
                                            <h3 class="font-black text-gray-900 text-2xl tracking-tight">Détails par Département</h3>
                                            <p class="text-xs text-gray-400 font-bold uppercase tracking-widest mt-1">Répartition des tâches par équipe</p>
                                        </div>
                                        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">
                                            {stats.deptDetails.map(dept => (
                                                <div key={dept.id} class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-50 flex flex-col group relative">
                                                    <div class="flex justify-between items-start mb-6">
                                                        <div>
                                                            <div class="flex items-center gap-2 mb-1">
                                                                <Icon name={dept.icon} className={`w-5 h-5 ${dept.id === 'rh' ? 'text-kya-orange' : 'text-kya-blue'}`} />
                                                                <h4 class="font-black text-gray-900 text-lg leading-none">{dept.name}</h4>
                                                            </div>
                                                            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">{dept.total} tâches au total</p>
                                                        </div>
                                                        <button onClick={() => downloadChart(`chart-${dept.id}`, `stats_${dept.id}`)} class="p-1.5 bg-gray-50 text-gray-400 hover:text-kya-blue hover:bg-blue-50 rounded-lg transition-all" title="Télécharger en image">
                                                            <Icon name="download" className="w-4 h-4" />
                                                        </button>
                                                    </div>
                                                    <div id={`chart-${dept.id}`} class="flex-1 flex flex-col items-center justify-center min-h-[150px]">
                                                        {dept.total > 0 ? (
                                                            <ResponsiveContainer width="100%" height={150}>
                                                                <BarChart data={dept.chartData} margin={{ top: 25, right: 0, left: 0, bottom: 0 }}>
                                                                    <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{ fontSize: 9, fontWeight: 700, fill: '#cbd5e1' }} />
                                                                    <Tooltip cursor={{fill: 'transparent'}} contentStyle={{ borderRadius: '1rem', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)' }} />
                                                                    <Bar dataKey="value" radius={[4, 4, 4, 4]} barSize={20}>
                                                                        {dept.chartData.map((entry, index) => (
                                                                            <Cell key={`cell-${index}`} fill={entry.color} />
                                                                        ))}
                                                                        <LabelList dataKey="value" position="top" style={{ fontSize: '10px', fontWeight: 'bold', fill: '#64748b' }} formatter={(val) => val > 0 ? val : ''} />
                                                                    </Bar>
                                                                </BarChart>
                                                            </ResponsiveContainer>
                                                        ) : (
                                                            <div class="flex flex-col items-center justify-center h-full text-gray-400 opacity-50">
                                                                <Icon name="inbox" className="w-8 h-8 mb-2" />
                                                                <p class="text-[10px] font-bold uppercase tracking-widest">Aucune tâche</p>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* Task Breakdown Table */}
                                <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-50 overflow-hidden">
                                    <div class="flex justify-between items-center mb-8">
                                        <div>
                                            <h3 class="font-black text-gray-900 text-2xl tracking-tight">État d'Avancement par Processus</h3>
                                            <p class="text-xs text-gray-400 font-bold uppercase tracking-widest mt-1">Détails des {stats.summary.total} tâches identifiées</p>
                                        </div>
                                        <div class="flex gap-4">
                                            <div class="flex items-center gap-2">
                                                <div class="w-3 h-3 rounded-full bg-kya-green"></div>
                                                <span class="text-[10px] font-black text-gray-400 uppercase">Terminé</span>
                                            </div>
                                            <div class="flex items-center gap-2">
                                                <div class="w-3 h-3 rounded-full bg-kya-orange"></div>
                                                <span class="text-[10px] font-black text-gray-400 uppercase">En cours</span>
                                            </div>
                                            <div class="flex items-center gap-2">
                                                <div class="w-3 h-3 rounded-full bg-gray-200"></div>
                                                <span class="text-[10px] font-black text-gray-400 uppercase">A faire</span>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div class="overflow-x-auto">
                                        <table class="w-full">
                                            <thead>
                                                <tr class="text-left text-[10px] font-black text-gray-300 uppercase tracking-[0.2em] border-b border-gray-50">
                                                    <th class="pb-6 px-4">Département</th>
                                                    <th class="pb-6 px-4">Tâche / Processus</th>
                                                    <th class="pb-6 px-4">Progression</th>
                                                    <th class="pb-6 px-4 text-center">Utilisation</th>
                                                </tr>
                                            </thead>
                                            <tbody class="divide-y divide-gray-50">
                                                {data.current.tasks.sort((a,b) => b.progress - a.progress).map(task => {
                                                    const dept = DEPARTMENTS.find(d => d.id === task.deptId);
                                                    return (
                                                        <tr key={task.id} class="group hover:bg-gray-50 transition-colors">
                                                            <td class="py-5 px-4">
                                                                <div class="flex items-center gap-3">
                                                                    <div class={`p-2 rounded-lg ${task.deptId === 'rh' ? 'bg-orange-50 text-kya-orange' : 'bg-blue-50 text-kya-blue'}`}>
                                                                        <Icon name={dept?.icon || 'help-circle'} className="w-4 h-4" />
                                                                    </div>
                                                                    <span class="text-[10px] font-black text-gray-400 uppercase tracking-tight">{dept?.name}</span>
                                                                </div>
                                                            </td>
                                                            <td class="py-5 px-4 font-bold text-gray-900 group-hover:text-kya-blue transition-colors">
                                                                {task.name}
                                                            </td>
                                                            <td class="py-5 px-4 w-64">
                                                                <div class="flex items-center gap-4">
                                                                    <div class="flex-1 bg-gray-100 h-2 rounded-full overflow-hidden shadow-inner ring-1 ring-gray-200/50">
                                                                        <div 
                                                                            class={`h-full rounded-full transition-all duration-1000 ${task.progress === 100 ? 'bg-kya-green' : task.progress > 0 ? 'bg-kya-orange' : 'bg-gray-200'}`}
                                                                            style={{ width: `${task.progress}%` }}
                                                                        ></div>
                                                                    </div>
                                                                    <span class="text-xs font-black text-gray-900 w-10">{task.progress}%</span>
                                                                </div>
                                                            </td>
                                                            <td class="py-5 px-4 text-center">
                                                                {task.isDeployed ? (
                                                                    <div class="inline-flex items-center gap-1.5 px-3 py-1 bg-green-500 text-white rounded-full text-[9px] font-black uppercase shadow-lg shadow-green-100">
                                                                        <Icon name="rocket" className="w-3 h-3" />
                                                                        En Production
                                                                    </div>
                                                                ) : (
                                                                    <span class="text-[10px] font-black text-gray-300 uppercase italic">Non déployé</span>
                                                                )}
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        ) : view === 'admin' ? (
                            <div class="animate-fade-in space-y-8 max-w-4xl mx-auto">
                                <div class="bg-gray-900 p-8 rounded-[2rem] text-white flex justify-between items-center shadow-2xl relative overflow-hidden">
                                    <div class="relative z-10">
                                        <h2 class="text-2xl font-black mb-2 leading-tight">Administration & Paramètres</h2>
                                        <p class="text-gray-400 text-sm font-medium">Gestion de l'historique et maintenance des données.</p>
                                    </div>
                                    <Icon name="shield-check" className="w-32 h-32 absolute -right-4 -bottom-4 opacity-10" />
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    {/* History Management */}
                                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-50 space-y-6">
                                        <div class="flex items-center gap-3 mb-4">
                                            <div class="p-3 bg-blue-50 text-blue-600 rounded-2xl">
                                                <Icon name="history" className="w-6 h-6" />
                                            </div>
                                            <h3 class="font-black text-gray-900 uppercase">Gestion de l'Historique</h3>
                                        </div>

                                        <p class="text-xs text-gray-500 leading-relaxed">
                                            Modifiez les dates des semaines passées pour les aligner avec votre calendrier réel.
                                        </p>

                                        <div class="space-y-4 max-h-[400px] overflow-y-auto pr-2">
                                            {[...data.history].reverse().map(h => (
                                                <div key={h.week} class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl border border-gray-100">
                                                    <div class="flex-1">
                                                        <span class="text-[10px] font-black text-blue-600 uppercase">Semaine {h.week}</span>
                                                        <div class="flex items-center gap-2 mt-1">
                                                            <input
                                                                type="date"
                                                                value={h.range?.start || ''}
                                                                onChange={(e) => editHistoryDate(h.week, 'start', e.target.value)}
                                                                class="bg-transparent border-b border-gray-100 focus:border-blue-500 focus:outline-none text-[10px] font-bold text-gray-700"
                                                            />
                                                            <span class="text-[10px] font-bold text-gray-400 italic">au</span>
                                                            <input
                                                                type="date"
                                                                value={h.range?.end || ''}
                                                                onChange={(e) => editHistoryDate(h.week, 'end', e.target.value)}
                                                                class="bg-transparent border-b border-gray-100 focus:border-blue-500 focus:outline-none text-[10px] font-bold text-gray-700"
                                                            />
                                                        </div>
                                                    </div>
                                                    <Icon name="calendar" className="w-4 h-4 text-gray-300" />
                                                </div>
                                            ))}
                                        </div>
                                        <button
                                            onClick={deleteLastWeek}
                                            class="w-full py-4 bg-red-50 text-red-600 rounded-2xl text-xs font-black uppercase tracking-widest hover:bg-red-600 hover:text-white transition-all flex items-center justify-center gap-2"
                                        >
                                            <Icon name="undo-2" className="w-4 h-4" />
                                            Supprimer la dernière archive (S{data.history.length})
                                        </button>
                                    </div>

                                    {/* Data Management & Export */}
                                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-50 space-y-6">
                                        <div class="flex items-center gap-3 mb-4">
                                            <div class="p-3 bg-green-50 text-green-600 rounded-2xl">
                                                <Icon name="database" className="w-6 h-6" />
                                            </div>
                                            <h3 class="font-black text-gray-900 uppercase">Données & Rapports</h3>
                                        </div>

                                        <div class="p-6 bg-gradient-to-br from-green-50 to-emerald-50 rounded-2xl border border-green-100 mb-6">
                                            <h4 class="font-bold text-green-900 mb-2">Exporters les Rapports</h4>
                                            <p class="text-xs text-green-700 mb-4 leading-relaxed">
                                                Générez un fichier Excel (.xlsx) pour votre suivi ou un rapport filtré sur les processus effectivement déployés.
                                            </p>
                                            <div class="space-y-3">
                                                <a href="/api/export" target="_blank" class="w-full py-3 bg-green-600 hover:bg-green-700 text-white rounded-xl shadow-lg shadow-green-200 transition-all flex items-center justify-center gap-2 text-sm font-black uppercase tracking-wide">
                                                    <Icon name="download" className="w-5 h-5" />
                                                    Base de Données Complète
                                                </a>
                                                <a href="/api/export-deployed" target="_blank" class="w-full py-3 bg-white border-2 border-green-500 text-green-600 hover:bg-green-50 rounded-xl transition-all flex items-center justify-center gap-2 text-sm font-black uppercase tracking-wide">
                                                    <Icon name="rocket" className="w-5 h-5" />
                                                    Uniquement Tâches Déployées
                                                </a>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Data Maintenance */}
                                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-50 space-y-6 flex flex-col">
                                        <div class="flex items-center gap-3 mb-4">
                                            <div class="p-3 bg-kya-orange/10 text-kya-orange rounded-2xl">
                                                <Icon name="database" className="w-6 h-6" />
                                            </div>
                                            <h3 class="font-black text-gray-900 uppercase">Maintenance</h3>
                                        </div>

                                        <div class="flex-1 space-y-6">
                                            <div class="p-6 bg-orange-50 rounded-2xl border border-orange-100">
                                                <h4 class="text-sm font-black text-kya-orange mb-2 uppercase">Réinitialisation Complète</h4>
                                                <p class="text-[10px] text-gray-500 font-medium mb-4">
                                                    Supprime tout l'historique et remet les tâches par défaut à 0%. Utile pour commencer un nouveau cycle annuel.
                                                </p>
                                                <button
                                                    onClick={resetAllData}
                                                    class="px-6 py-3 bg-white text-red-500 border border-red-200 rounded-xl text-xs font-black uppercase tracking-widest hover:bg-red-500 hover:text-white transition-all"
                                                >
                                                    Réinitialiser tout
                                                </button>
                                            </div>
                                        </div>

                                        <div class="p-6 bg-blue-50 rounded-2xl border border-blue-100 italic text-[10px] text-blue-600 font-medium leading-relaxed">
                                            Note: Pour commencer officiellement à la semaine 7 (19 Janvier), utilisez "Supprimer la dernière archive" deux fois pour effacer S8 et S7 de mes données tests.
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div class="animate-slide-up space-y-8 max-w-4xl mx-auto">
                                <div class="bg-blue-600 p-8 rounded-[2rem] text-white flex justify-between items-center shadow-2xl relative overflow-hidden">
                                    <div class="relative z-10">
                                        <h2 class="text-2xl font-black mb-2 leading-tight">Mise à jour des indicateurs</h2>
                                        <p class="text-blue-100 text-sm font-medium">Attribuez un taux de digitalisation à chaque tâche métier.</p>
                                    </div>
                                    <Icon name="scan-face" className="w-32 h-32 absolute -right-4 -bottom-4 opacity-10" />
                                </div>

                                {DEPARTMENTS.map(dept => {
                                    const deptTasks = activeData.current.tasks.filter(t => t.deptId === dept.id);
                                    const filteredTasks = dept.id === 'rh'
                                        ? (rhFilter === 'all' ? deptTasks : deptTasks.filter(t => t.type === rhFilter))
                                        : deptTasks;
                                    // Sort by urgency: 1 (Haute) first, then 2 (Moyenne), then 3 (Normale/undefined)
                                    const sortedTasks = [...filteredTasks].sort((a, b) => (a.urgency || 3) - (b.urgency || 3));

                                    return (
                                        <div key={dept.id} class="bg-white rounded-[2rem] shadow-sm border border-gray-50 overflow-hidden hover:shadow-xl transition-all border-l-[1rem] bg-gradient-to-r from-white to-gray-50" style={{ borderLeftColor: dept.id === 'rh' ? '#F58220' : '#0054A6' }}>
                                            <div class="px-8 py-6 flex flex-col md:flex-row justify-between items-start md:items-center bg-white/50 border-b border-gray-50 backdrop-blur-sm gap-4">
                                                <div class="flex items-center gap-3">
                                                    <div class={`p-3 rounded-2xl ${dept.id === 'rh' ? 'bg-orange-50 text-kya-orange' : 'bg-blue-50 text-kya-blue'}`}>
                                                        <Icon name={dept.icon} className="w-6 h-6" />
                                                    </div>
                                                    <div>
                                                        <div class="flex items-center gap-2">
                                                            <h3 class="font-black text-gray-900 uppercase tracking-tighter">{dept.name}</h3>
                                                            {dept.id === 'rh' && (
                                                                <span class="px-2 py-0.5 bg-kya-orange/10 text-kya-orange text-[9px] font-black rounded uppercase">Multi-Espace</span>
                                                            )}
                                                        </div>
                                                        <p class="text-[10px] text-gray-400 font-black tracking-widest uppercase">SECTION INDICATEURS</p>
                                                    </div>
                                                </div>

                                                <div class="flex items-center gap-3">
                                                    {dept.id === 'rh' && (
                                                        <div class="flex p-1 bg-gray-100 rounded-xl">
                                                            <button
                                                                onClick={() => setRhFilter('all')}
                                                                class={`px-3 py-1.5 rounded-lg text-[9px] font-black uppercase transition-all ${rhFilter === 'all' ? 'bg-white text-gray-900 shadow-sm' : 'text-gray-400'}`}
                                                            >
                                                                Tous
                                                            </button>
                                                            <button
                                                                onClick={() => setRhFilter('employe')}
                                                                class={`px-3 py-1.5 rounded-lg text-[9px] font-black uppercase transition-all ${rhFilter === 'employe' ? 'bg-kya-blue text-white shadow-sm' : 'text-gray-400'}`}
                                                            >
                                                                Employés
                                                            </button>
                                                            <button
                                                                onClick={() => setRhFilter('stagiaire')}
                                                                class={`px-3 py-1.5 rounded-lg text-[9px] font-black uppercase transition-all ${rhFilter === 'stagiaire' ? 'bg-kya-orange text-white shadow-sm' : 'text-gray-400'}`}
                                                            >
                                                                Stagiaires
                                                            </button>
                                                        </div>
                                                    )}
                                                    <button
                                                        onClick={() => addTask(dept.id)}
                                                        class="px-4 py-2 bg-gray-900 text-white rounded-xl text-xs font-black flex items-center gap-2 hover:bg-black transition-all transform active:scale-95"
                                                    >
                                                        <Icon name="plus" className="w-4 h-4" />
                                                        AJOUTER
                                                    </button>
                                                </div>
                                            </div>
                                            <div class="p-8 space-y-6">
                                                {sortedTasks.map(task => {
                                                    const urgencyLevel = task.urgency || 3;
                                                    const urgencyConfig = {
                                                        1: { label: 'Urgent', bg: 'bg-red-500', text: 'text-white', border: 'border-red-200', cardBg: 'bg-red-50/30' },
                                                        2: { label: 'Prioritaire', bg: 'bg-orange-400', text: 'text-white', border: 'border-orange-200', cardBg: 'bg-orange-50/30' },
                                                        3: { label: 'Normal', bg: 'bg-blue-100', text: 'text-blue-600', border: 'border-gray-100', cardBg: '' },
                                                    }[urgencyLevel];
                                                    return (
                                                        <div key={task.id} class={`flex flex-col md:flex-row md:items-center gap-6 p-6 rounded-[1.5rem] border shadow-sm hover:shadow-md transition-all group relative overflow-hidden ${task.isDeployed ? 'bg-green-50/20 border-green-200' : urgencyConfig.cardBg + ' border-' + (urgencyLevel === 1 ? 'red' : urgencyLevel === 2 ? 'orange' : 'gray') + '-100'}`}>
                                                            {/* Urgency ribbon (top-left) - clickable to cycle */}
                                                            {urgencyLevel < 3 && (
                                                                <div
                                                                    onClick={() => updateUrgency(task.id)}
                                                                    title="Cliquer pour changer le niveau d'urgence"
                                                                    class={`absolute top-0 left-0 px-3 py-1 ${urgencyConfig.bg} ${urgencyConfig.text} text-[8px] font-black uppercase tracking-tighter rounded-br-xl shadow-sm flex items-center gap-1 cursor-pointer hover:opacity-80 transition-opacity`}>
                                                                    <span>{urgencyLevel === 1 ? '🔴' : '🟠'}</span>
                                                                    {urgencyConfig.label}
                                                                    <span class="opacity-70 ml-1">↻</span>
                                                                </div>
                                                            )}
                                                            {/* Workflow badge (top-right) */}
                                                            {task.name.includes('(Flux)') && (
                                                                <div class="absolute top-0 right-0 px-3 py-1 bg-blue-500 text-white text-[8px] font-black uppercase tracking-tighter rounded-bl-xl shadow-sm z-10">
                                                                    Workflow
                                                                </div>
                                                            )}
                                                            
                                                            <div class={`flex-1 flex items-center justify-between ${urgencyLevel < 3 ? 'mt-5' : ''}`}>
                                                                <div>
                                                                    <div class="flex items-center gap-2 flex-wrap">
                                                                        <div class="font-black text-gray-800 text-lg group-hover:text-kya-blue transition-colors uppercase tracking-tight pr-4">
                                                                            {task.name}
                                                                        </div>
                                                                        {task.type === 'stagiaire' && (
                                                                            <span class="px-2 py-0.5 bg-orange-100 text-kya-orange text-[8px] font-black rounded uppercase">Stage</span>
                                                                        )}
                                                                        {urgencyLevel === 3 && (
                                                                            <span
                                                                                onClick={() => updateUrgency(task.id)}
                                                                                title="Cliquer pour changer le niveau d'urgence"
                                                                                class="px-2 py-0.5 bg-blue-50 text-blue-400 text-[8px] font-black rounded uppercase cursor-pointer hover:bg-blue-100 transition-colors select-none"
                                                                            >🔵 Normal ↻</span>
                                                                        )}
                                                                    </div>
                                                                    <div class={`text-[10px] font-black uppercase tracking-widest mt-2 flex items-center gap-2 ${task.progress === 100 ? 'text-green-500' : task.progress === 0 ? 'text-red-500' : 'text-kya-blue/60'}`}>
                                                                        Status: {task.progress === 100 ? 'Terminé ✓' : task.progress === 0 ? 'Non débuté' : 'En cours de digitalisation'}
                                                                    </div>
                                                                </div>
                                                                <div class="flex gap-2 mr-4 opacity-0 group-hover:opacity-100 transition-opacity items-center">
                                                                    <button 
                                                                        onClick={() => toggleDeployed(task.id)} 
                                                                        class={`flex items-center gap-1 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase transition-all shadow-sm ${task.isDeployed ? 'bg-green-500 text-white hover:bg-green-600' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}
                                                                        title="Marquer comme déployé / en production"
                                                                    >
                                                                        <Icon name="rocket" className="w-3 h-3" />
                                                                        {task.isDeployed ? 'Déployé' : 'Non Déployé'}
                                                                    </button>
                                                                    <div class="w-px h-6 bg-gray-200 mx-1"></div>
                                                                    <button onClick={() => renameTask(task.id)} class="p-2 text-gray-400 hover:text-kya-orange hover:bg-orange-50 rounded-lg transition-all" title="Renommer">
                                                                        <Icon name="pencil" className="w-4 h-4" />
                                                                    </button>
                                                                    <button onClick={() => deleteTask(task.id)} class="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all" title="Supprimer">
                                                                        <Icon name="trash-2" className="w-4 h-4" />
                                                                    </button>
                                                                </div>
                                                            </div>
                                                            <div class="flex items-center gap-6 w-full md:w-80">
                                                                <div class="flex-1 relative pb-4">
                                                                    <input
                                                                        type="range"
                                                                        min="0" max="100"
                                                                        value={task.progress}
                                                                        onChange={(e) => updateProgress(task.id, e.target.value)}
                                                                        class={`w-full h-2 bg-gray-100 rounded-lg appearance-none cursor-pointer ${urgencyLevel === 1 ? 'accent-red-500' : urgencyLevel === 2 ? 'accent-orange-400' : 'accent-kya-orange'}`}
                                                                    />
                                                                    <div class="flex justify-between absolute bottom-0 left-0 w-full px-1">
                                                                        <span class="text-[8px] font-black text-gray-300">0%</span>
                                                                        <span class="text-[8px] font-black text-gray-300">50%</span>
                                                                        <span class="text-[8px] font-black text-gray-300">100%</span>
                                                                    </div>
                                                                </div>
                                                                <div class={`w-16 h-12 flex items-center justify-center font-black rounded-2xl shadow-lg transform group-hover:scale-110 transition-transform ${urgencyLevel === 1 ? 'bg-red-500 text-white' : urgencyLevel === 2 ? 'bg-orange-400 text-white' : 'bg-gray-900 text-white'}`}>
                                                                    {task.progress}%
                                                                </div>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                                {sortedTasks.length === 0 && (
                                                    <div class="text-center py-10 border-2 border-dashed border-gray-100 rounded-3xl">
                                                        <Icon name="cloud-off" className="w-12 h-12 text-gray-200 mx-auto mb-4" />
                                                        <p class="text-gray-400 font-black uppercase tracking-widest text-xs">Aucun processus identifié dans cette catégorie</p>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )
                        }
                    </main >
                </div >
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
