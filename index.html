<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYA Digitalization Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kya: {
                            orange: '#F58220',
                            green: '#8DC63F',
                            blue: '#0054A6',
                            dark: '#1A1A1A',
                            light: '#F4F7FE'
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.5s ease-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Prop-Types (required by Recharts) -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <!-- Recharts -->
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #F4F7FE;
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .progress-bar {
            transition: width 0.6s ease-in-out;
        }
    </style>
</head>

<body class="text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        // Basic check for Recharts
        if (typeof Recharts === 'undefined') {
            console.error('Recharts not loaded! Checking window.Recharts...');
            window.Recharts = window.Recharts || {};
        }

        const { useState, useEffect, useMemo } = React;
        const {
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer,
            LineChart, Line, Cell, PieChart, Pie, Legend, LabelList
        } = Recharts;

        // Icons placeholder (since Lucide needs to be initialized after render)
        const Icon = ({ name, className = "" }) => {
            const [svgContent, setSvgContent] = useState('');

            useEffect(() => {
                const updateIcon = () => {
                    if (window.lucide && window.lucide.icons) {
                        const pascalName = name.split('-')
                            .map(part => part.charAt(0).toUpperCase() + part.slice(1))
                            .join('');

                        const iconData = window.lucide.icons[pascalName] || window.lucide.icons[name.charAt(0).toUpperCase() + name.slice(1)];

                        if (iconData && Array.isArray(iconData)) {
                            const paths = iconData.map(([tag, attrs]) => {
                                const attrStr = Object.entries(attrs)
                                    .map(([k, v]) => `${k}="${v}"`)
                                    .join(' ');
                                return `<${tag} ${attrStr}></${tag}>`;
                            }).join('');
                            setSvgContent(paths);
                        }
                    }
                };

                updateIcon();
                if (!window.lucide) {
                    const timer = setInterval(() => {
                        if (window.lucide) {
                            updateIcon();
                            clearInterval(timer);
                        }
                    }, 100);
                    return () => clearInterval(timer);
                }
            }, [name, className]);

            if (!svgContent) return <span className={className}></span>;

            return (
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24" height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth="2"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={className}
                    dangerouslySetInnerHTML={{ __html: svgContent }}
                />
            );
        };

        const DEPARTMENTS = [
            { id: 'rh', name: 'Ressources Humaines', icon: 'users' },
            { id: 'compta', name: 'Comptabilité/Finances', icon: 'credit-card' },
            { id: 'achat_stock', name: 'Achat et Stock', icon: 'shopping-cart' },
            { id: 'logistique', name: 'Logistique', icon: 'truck' }
        ];

        const App = () => {
            const [view, setView] = useState('dashboard'); // dashboard | tasks | admin
            const [rhFilter, setRhFilter] = useState('all'); // all | employe | stagiaire
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);            // Helper to update data
            const updateData = (updateFn) => {
                setData(prev => updateFn(prev));
            };

            // Load from Server API

            useEffect(() => {
                const loadData = async () => {
                    try {
                        const res = await fetch('/api/data');
                        const serverData = await res.json();

                        // Extract preprod data dynamically as the only source of truth
                        if (serverData.phases && serverData.phases.preprod) {
                            setData(serverData.phases.preprod);
                        } else if (serverData.current && serverData.history) {
                             setData(serverData);
                        } else {
                            setData(serverData);
                        }
                        setLoading(false);
                    } catch (err) {
                        console.error("Failed to load data:", err);
                        setLoading(false);
                    }
                };
                loadData();
            }, []);

            // Handle server-side persistence
            useEffect(() => {
                if (data && !loading) {
                    fetch('/api/data', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    }).catch(err => console.error("Failed to save data:", err));

                    // Keep a backup in local storage
                    localStorage.setItem('kya_digital_backup', JSON.stringify(data));
                }
            }, [data, loading]);

            // Calculations based on data
            const stats = useMemo(() => {
                if (!data) return null;
                const deptStats = DEPARTMENTS.map(d => {
                    const deptTasks = data.current.tasks.filter(t => t.deptId === d.id);
                    const avg = deptTasks.length > 0
                        ? Math.round(deptTasks.reduce((acc, t) => acc + t.progress, 0) / deptTasks.length)
                        : 0;

                    // Comparison logic
                    const lastWeek = data.history[data.history.length - 1];
                    const lastAvg = lastWeek?.averages?.find(a => a.id === d.id)?.val || 0;
                    const diff = avg - lastAvg;

                    return { ...d, progress: avg, count: deptTasks.length, diff };
                });

                const totalAvg = Math.round(deptStats.reduce((acc, d) => acc + d.progress, 0) / deptStats.length);

                // Global Counts
                const tasks = data.current.tasks;
                const totalTasks = tasks.length;
                const digitizedTasks = tasks.filter(t => t.progress === 100).length;
                const inProgressTasks = tasks.filter(t => t.progress > 0 && t.progress < 100).length;
                const deployedTasks = tasks.filter(t => t.isDeployed).length;

                // Global comparison
                const lastWeekEntries = data.history[data.history.length - 1];
                const lastTotalAvg = lastWeekEntries
                    ? Math.round(lastWeekEntries.averages.reduce((acc, a) => acc + a.val, 0) / lastWeekEntries.averages.length)
                    : 0;
                const totalDiff = totalAvg - lastTotalAvg;

                // History data for chart
                const historyData = data.history.map(h => {
                    const hAvg = h.averages
                        ? Math.round(h.averages.reduce((acc, a) => acc + a.val, 0) / h.averages.length)
                        : 0;
                    return { name: `S${h.week}`, avg: hAvg };
                });
                historyData.push({ name: `S${data.history.length + 1}`, avg: totalAvg });

                const summary = {
                    total: totalTasks,
                    digitized: digitizedTasks,
                    inProgress: inProgressTasks,
                    deployed: deployedTasks
                };

                const todo = summary.total - summary.digitized - summary.inProgress;

                const statusData = [
                    { name: 'Terminé', value: summary.digitized, color: '#3A9E3E' },
                    { name: 'En cours', value: summary.inProgress, color: '#F1802D' },
                    { name: 'À faire', value: todo, color: '#E5E7EB' }
                ].filter(d => d.value > 0);

                const deployData = [
                    { name: 'En production', value: summary.deployed, color: '#0054A6' },
                    { name: 'Non déployé', value: Math.max(0, summary.digitized - summary.deployed), color: '#3A9E3E' }
                ].filter(d => d.value > 0);

                const deptDetails = DEPARTMENTS.map(dept => {
                    const deptTasks = data.current.tasks.filter(t => t.deptId === dept.id);
                    const done = deptTasks.filter(t => t.progress === 100).length;
                    const inProgress = deptTasks.filter(t => t.progress > 0 && t.progress < 100).length;
                    const todoPending = deptTasks.length - done - inProgress;
                    return {
                        id: dept.id,
                        name: dept.name,
                        icon: dept.icon,
                        total: deptTasks.length,
                        chartData: [
                            { name: 'Terminé', value: done, color: '#3A9E3E' },
                            { name: 'En cours', value: inProgress, color: '#F1802D' },
                            { name: 'À faire', value: todoPending, color: '#E5E7EB' }
                        ]
                    };
                });

                return { 
                    deptStats, 
                    totalAvg, 
                    lastTotalAvg, 
                    totalDiff, 
                    historyData,
                    statusData,
                    deployData,
                    deptDetails,
                    summary
                };
            }, [data]);

            const addTask = (deptId) => {
                const name = prompt("Nom de la tâche digitalisable :");
                if (!name) return;

                let type = null;
                if (deptId === 'rh') {
                    const isStagiaire = confirm("La tâche concerne-t-elle les stagiaires ? (Sinon => Employé)");
                    type = isStagiaire ? 'stagiaire' : 'employe';
                }

                const urgencyStr = prompt("Niveau d'urgence ?\n1 = 🔴 Haute (urgent, à traiter en priorité)\n2 = 🟠 Moyenne (personnalisation demandée)\n3 = 🔵 Normale (amélioration planifiée)", "3");
                const urgency = urgencyStr ? Math.min(3, Math.max(1, parseInt(urgencyStr) || 3)) : 3;

                const newTask = {
                    id: Date.now(),
                    deptId,
                    name,
                    progress: 0,
                    urgency,
                    isDeployed: false,
                    ...(type && { type })
                };

                updateData((prev) => ({
                    ...prev,
                    current: {
                        ...prev.current,
                        tasks: [...prev.current.tasks, newTask]
                    }
                }));
            };

            const renameTask = (taskId) => {
                if (!data) return;
                const task = data.current.tasks.find(t => t.id === taskId);
                const newName = prompt("Renommer la tâche :", task.name);
                if (!newName || newName === task.name) return;

                updateData((prev) => ({
                    ...prev,
                    current: {
                        ...prev.current,
                        tasks: prev.current.tasks.map(t =>
                            t.id === taskId ? { ...t, name: newName } : t
                        )
                    }
                }));
            };

            const deleteTask = (taskId) => {
                if (!data) return;
                const task = data.current.tasks.find(t => t.id === taskId);
                if (!confirm(`Voulez-vous supprimer la tâche "${task.name}" ?`)) return;

                updateData((prev) => ({
                    ...prev,
                    current: {
                        ...prev.current,
                        tasks: prev.current.tasks.filter(t => t.id !== taskId)
                    }
                }));
            };

            const updateProgress = (taskId, value) => {
                updateData((prev) => ({
                    ...prev,
                    current: {
                        ...prev.current,
                        tasks: prev.current.tasks.map(t =>
                            t.id === taskId ? { ...t, progress: parseInt(value) } : t
                        )
                    }
                }));
            };

            // Cycle urgency: 1 → 2 → 3 → 1
            const updateUrgency = (taskId) => {
                updateData((prev) => ({
                    ...prev,
                    current: {
                        ...prev.current,
                        tasks: prev.current.tasks.map(t => {
                            if (t.id !== taskId) return t;
                            const current = t.urgency || 3;
                            const next = current >= 3 ? 1 : current + 1;
                            return { ...t, urgency: next };
                        })
                    }
                }));
            };

            const toggleDeployed = (taskId) => {
                updateData((prev) => ({
                    ...prev,
                    current: {
                        ...prev.current,
                        tasks: prev.current.tasks.map(t =>
                            t.id === taskId ? { ...t, isDeployed: !t.isDeployed } : t
                        )
                    }
                }));
            };

            const updateDateRange = (field, value) => {
                updateData((prev) => ({
                    ...prev,
                    current: {
                        ...prev.current,
                        dateRange: { ...prev.current.dateRange, [field]: value }
                    }
                }));
            };

            const archiveWeek = () => {
                if (!confirm(`Voulez-vous clôturer cette semaine et enregistrer les moyennes ?`)) return;

                const weekEntry = {
                    week: data.history.length + 1,
                    date: data.current.dateRange.start && data.current.dateRange.end
                        ? `${data.current.dateRange.start} au ${data.current.dateRange.end}`
                        : new Date().toISOString().split('T')[0],
                    averages: stats.deptStats.map(d => ({ id: d.id, val: d.progress })),
                    range: { ...data.current.dateRange }
                };

                updateData((prev) => ({
                    ...prev,
                    history: [...prev.history, weekEntry],
                    current: {
                        ...prev.current,
                        dateRange: { start: '', end: '' }
                    }
                }));
                alert(`Semaine clôturée avec succès !`);
            };

            const deleteLastWeek = () => {
                if (!data || data.history.length === 0) return alert("L'historique est déjà vide.");
                if (!confirm(`Voulez-vous vraiment supprimer l'archive de la Semaine ${data.history.length} ?`)) return;

                updateData((prev) => ({
                    ...prev,
                    history: prev.history.slice(0, -1)
                }));
            };

            const resetAllData = () => {
                if (!confirm(`ATTENTION : Cela va supprimer TOUTES les données (tâches et historique). Continuer ?`)) return;

                const defaultTasks = [
                    { id: 1, deptId: 'rh', name: 'Recrutement digital', progress: 0 },
                    { id: 2, deptId: 'rh', name: 'Gestion des congés', progress: 0 },
                    { id: 3, deptId: 'compta', name: 'Facturation électronique', progress: 0 },
                    { id: 4, deptId: 'achats', name: 'Portail fournisseurs', progress: 0 },
                    { id: 5, deptId: 'Stock', name: 'Suivi temps réel', progress: 0 },
                ];

                updateData(() => ({
                    history: [],
                    current: {
                        dateRange: { start: '', end: '' },
                        tasks: defaultTasks
                    }
                }));
                alert("Tableau de bord réinitialisé.");
            };

            const editHistoryDate = (week, field, value) => {
                updateData((prev) => ({
                    ...prev,
                    history: prev.history.map(h => {
                        if (h.week === week) {
                            const newRange = { ...(h.range || { start: '', end: '' }), [field]: value };
                            return {
                                ...h,
                                range: newRange,
                                date: newRange.start && newRange.end ? `${newRange.start} au ${newRange.end}` : h.date
                            };
                        }
                        return h;
                    })
                }));
            };

            const submitFeedback = async () => {
                const message = prompt("Votre feedback ou suggestion :");
                if (!message) return;

                try {
                    await fetch('/api/feedback', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            phase: 'preprod',
                            message,
                            user: 'User' // simplistic user tracking
                        })
                    });
                    alert("Merci ! Votre retour a été enregistré.");
                } catch (e) {
                    console.error(e);
                    alert("Erreur lors de l'envoi du feedback.");
                }
            };

            const downloadChart = (chartId, fileName) => {
                const chartNode = document.getElementById(chartId);
                if (!chartNode) return;
                const svgElement = chartNode.querySelector('svg');
                if (!svgElement) return;

                const svgData = new XMLSerializer().serializeToString(svgElement);
                const canvas = document.createElement("canvas");
                const ctx = canvas.getContext("2d");
                const img = new Image();

                const svgBase64 = encodeURIComponent(svgData);
                const url = `data:image/svg+xml;charset=utf-8,${svgBase64}`;

                img.onload = () => {
                    canvas.width = svgElement.clientWidth.baseVal ? svgElement.clientWidth.baseVal.value : 400;
                    canvas.height = svgElement.clientHeight.baseVal ? svgElement.clientHeight.baseVal.value : 300;
                    ctx.fillStyle = "white"; // Solid background
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);

                    const a = document.createElement("a");
                    a.download = `${fileName}.png`;
                    a.href = canvas.toDataURL("image/png");
                    a.click();
                };
                img.src = url;
            };

            if (loading || !data) return (
                <div class="h-screen w-screen flex flex-col items-center justify-center bg-gray-50">
                    <div class="w-16 h-16 border-4 border-kya-blue border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p class="font-black text-kya-blue uppercase tracking-widest animate-pulse">Chargement DSS...</p>
                </div>
            );

            return (
                <div class="flex h-screen overflow-hidden">
                    {/* ... Same content until view switch ... */}
                    {/* Sidebar */}
                    <div class="w-64 bg-white border-r border-gray-100 flex flex-col shadow-sm">
                        <div class="p-6 flex flex-col items-center gap-4">
                            <div class="w-full p-2 bg-white rounded-xl shadow-sm border border-gray-50 flex items-center justify-center">
                                <img src="logo_kya.webp" alt="KYA Energy" class="max-h-12 object-contain" />
                            </div>
                            <div class="flex items-center gap-2">
                                <div class="w-2 h-2 rounded-full bg-kya-orange animate-pulse"></div>
                                <span class="font-bold text-sm tracking-widest text-[#0054A6]">DASHBOARD <span class="text-kya-orange">DSS</span></span>
                            </div>
                        </div>

                        <nav class="flex-1 px-4 py-4 space-y-2">
                            <button
                                onClick={() => setView('dashboard')}
                                class={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${view === 'dashboard' ? 'bg-kya-blue text-white shadow-md' : 'text-gray-500 hover:bg-white hover:text-kya-blue'}`}
                            >
                                <Icon name="layout-dashboard" className="w-5 h-5" />
                                <span class="font-medium">Tableau de Bord</span>
                            </button>
                            <button
                                onClick={() => setView('stats')}
                                class={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${view === 'stats' ? 'bg-kya-blue text-white shadow-md' : 'text-gray-500 hover:bg-white hover:text-kya-blue'}`}
                            >
                                <Icon name="BarChart3" className="w-5 h-5" />
                                <span class="font-medium">Récapitulatif Stats</span>
                            </button>
                            <button
                                onClick={() => setView('tasks')}
                                class={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${view === 'tasks' ? 'bg-kya-blue text-white shadow-md' : 'text-gray-500 hover:bg-white hover:text-kya-blue'}`}
                            >
                                <Icon name="list-checks" className="w-5 h-5" />
                                <span class="font-medium">Gestion des Tâches</span>
                            </button>
                            <button
                                onClick={() => setView('admin')}
                                class={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${view === 'admin' ? 'bg-kya-blue text-white shadow-md' : 'text-gray-500 hover:bg-white hover:text-kya-blue'}`}
                            >
                                <Icon name="settings" className="w-5 h-5" />
                                <span class="font-medium">Administration</span>
                            </button>
                        </nav>

                        <div class="p-4 bg-orange-50 m-4 rounded-2xl border border-orange-100">
                            <p class="text-[10px] text-kya-orange font-bold mb-1 uppercase tracking-widest text-center">Digitalisation Globale</p>
                            <div class="flex flex-col items-center justify-center gap-0 mb-2">
                                <span class="text-3xl font-black text-kya-blue">{stats.totalAvg}%</span>
                                <span class={`text-[10px] font-bold ${stats.totalDiff >= 0 ? 'text-green-600' : 'text-red-600'}`}>
                                    {stats.totalAvg === 0 && stats.lastTotalAvg === 0 ? '' : (
                                        <>
                                            {stats.totalDiff >= 0 ? '▲' : '▼'} {Math.abs(stats.totalDiff)}%
                                            <span class="opacity-50 ml-1">(S{data.history.length}: {stats.lastTotalAvg}%)</span>
                                        </>
                                    )}
                                </span>
                            </div>
                            <div class="w-full bg-white h-2 rounded-full overflow-hidden border border-orange-100 shadow-inner">
                                <div class="bg-gradient-to-r from-kya-orange to-red-500 h-full progress-bar" style={{ width: `${stats.totalAvg}%` }}></div>
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <main class="flex-1 overflow-y-auto bg-kya-light p-8">
                        {/* Header */}
                        <header class="flex justify-between items-center mb-10">
                            <div>
                                <h1 class="text-3xl font-black text-gray-900 tracking-tight flex items-center gap-4">
                                    {view === 'dashboard' ? 'Digitalisation Services Support' : 
                                     view === 'stats' ? 'Récapitulatif des Statistiques' :
                                     view === 'admin' ? 'Administration & Paramètres' : 
                                     'Configuration des Tâches'}
                                </h1>
                                <div class="flex items-center gap-4 mt-1">
                                    <div class="px-2 py-0.5 bg-kya-blue text-white text-[10px] font-bold rounded uppercase">Semaine {data.history.length + 1}</div>
                                    <div class="flex items-center gap-2 bg-white/50 px-3 py-1 rounded-lg border border-gray-100">
                                        <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Période :</span>
                                        <div class="flex items-center gap-1">
                                            <input
                                                type="date"
                                                value={data.current.dateRange.start}
                                                onChange={(e) => updateDateRange('start', e.target.value)}
                                                class="bg-transparent text-[10px] font-bold text-gray-900 focus:outline-none cursor-pointer"
                                            />
                                            <span class="text-[10px] font-bold text-gray-400">au</span>
                                            <input
                                                type="date"
                                                value={data.current.dateRange.end}
                                                onChange={(e) => updateDateRange('end', e.target.value)}
                                                class="bg-transparent text-[10px] font-bold text-gray-900 focus:outline-none cursor-pointer"
                                            />
                                        </div>
                                    </div>
                                    {!data.current.dateRange.start && !data.current.dateRange.end && (
                                        <p class="text-gray-400 text-xs font-medium uppercase tracking-widest">{new Date().toLocaleDateString('fr-FR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p>
                                    )}
                                </div>
                            </div>
                            <div class="flex gap-4">
                                <button onClick={submitFeedback} class="px-4 py-2.5 bg-orange-50 text-kya-orange border border-orange-100 rounded-xl hover:bg-orange-100 transition-all flex items-center gap-2 text-xs font-bold uppercase tracking-wide">
                                    <Icon name="message-circle" className="w-4 h-4" />
                                    Feedback
                                </button>
                                <button onClick={archiveWeek} class="group px-5 py-2.5 bg-white text-gray-700 border border-gray-100 rounded-xl hover:border-kya-orange shadow-sm transition-all flex items-center gap-2 text-sm font-bold">
                                    <Icon name="save" className="w-4 h-4 group-hover:text-kya-orange" />
                                    Sauvegarder Semaine
                                </button>
                                <div class="flex items-center gap-3 pl-4 border-l border-gray-200">
                                    <div class="text-right">
                                        <p class="text-xs font-bold text-gray-900 leading-none">Team DSS</p>

                                            <div class="flex justify-between items-start mb-6">
                                                <div class={`p-4 rounded-2xl bg-opacity-10 ${dept.id === 'rh' ? 'bg-orange-500 text-orange-500' : dept.id === 'compta' ? 'bg-blue-500 text-blue-500' : 'bg-green-500 text-green-500'}`}>

                                            </div>
                                            <div class="space-y-2">
                                                <div class="flex justify-between text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                                                    <span>Progression</span>
                                                    <span>{dept.count} tasks</span>
                                                </div>
                                                <div class="w-full bg-gray-50 h-3 rounded-full overflow-hidden border border-gray-100 transition-all group-hover:h-4 shadow-inner">

                                            <div>
                                                <h3 class="font-black text-gray-900 text-xl tracking-tight">Évolution de la Digitalisation</h3>
